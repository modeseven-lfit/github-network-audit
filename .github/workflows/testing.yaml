---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Connection allowlist validation workflow
#
# This workflow exercises the allowlist produced for lfreleng-actions
# against a locked-down harden-runner configuration. It verifies that:
#
#   * every endpoint listed in `vars.TEST_PERMITTED` is reachable, and
#   * every endpoint listed in `vars.TEST_DENIED` is blocked.
#
# The heavy lifting happens in `scripts/connection_test.py`, an
# asyncio-based probe harness that:
#
#   * runs all probes in parallel with a hard wall-clock cap,
#   * cancels immediately on SIGTERM/SIGINT (step cancellation works), and
#   * derives expected pass/fail counts from the input line count, so the
#     variables are freely extensible without editing the workflow.
#
# Expected variables (configure at repo or org level):
#
#   CONNECTION_WHITELIST
#     `host:port` entries separated by newlines OR spaces. The
#     `prepare` job normalises the value; harden-runner's
#     `allowed-endpoints` input expects a single whitespace-separated
#     string, and pasting a multi-line variable directly causes only
#     the first line to be honoured.
#
#   TEST_PERMITTED
#     One `host:port` entry per line. MUST be a subset of
#     `CONNECTION_WHITELIST`; each entry is expected to connect.
#
#   TEST_DENIED
#     One `host:port` entry per line. MUST NOT appear in
#     `CONNECTION_WHITELIST`; each entry is expected to be blocked.
#
#   VEXXHOST_CIDR_BLOCKS
#     Newline-separated IPv4/IPv6 CIDR blocks for AS33028 (VEXXHOST).
#     Informational only; harden-runner does not consume CIDRs.

name: "Test Connection Allowlist 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # ---------------------------------------------------------------
  # Normalise the CONNECTION_WHITELIST variable
  # ---------------------------------------------------------------
  prepare:
    name: "Normalise allowlist"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      whitelist: ${{ steps.normalise.outputs.whitelist }}
      count: ${{ steps.normalise.outputs.count }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: "Normalise CONNECTION_WHITELIST"
        id: normalise
        shell: bash
        env:
          RAW_WHITELIST: ${{ vars.CONNECTION_WHITELIST }}
        run: |
          set -u
          if [ -z "${RAW_WHITELIST:-}" ]; then
            echo "::error::CONNECTION_WHITELIST variable is not set"
            exit 1
          fi

          # Collapse all whitespace (newlines, tabs, multiple spaces)
          # into single spaces and strip leading/trailing whitespace.
          normalised="$(printf '%s' "$RAW_WHITELIST" \
            | tr '\r\n\t' '   ' \
            | tr -s ' ' \
            | sed 's/^ //; s/ $//')"

          count="$(printf '%s' "$normalised" | tr ' ' '\n' \
            | grep -c . || true)"

          {
            echo "whitelist=${normalised}"
            echo "count=${count}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## 📋 Allowlist Preparation"
            echo ""
            echo "- Normalised **${count}** \`host:port\` entries from"
            echo "  \`vars.CONNECTION_WHITELIST\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------
  # Positive test: whitelisted endpoints MUST be reachable
  # ---------------------------------------------------------------
  positive-connection-tests:
    name: "Test PERMITTED Connections"
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    # Script has its own 60s overall cap; 3 min is generous headroom
    # for the harden-runner agent install and repo checkout.
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: ${{ needs.prepare.outputs.whitelist }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Run permitted connection tests"
        shell: bash
        env:
          TEST_PERMITTED: ${{ vars.TEST_PERMITTED }}
        run: |
          python3 scripts/connection_test.py \
            --mode permitted \
            --targets-env TEST_PERMITTED \
            --connect-timeout 5 \
            --max-attempts 3 \
            --overall-timeout 60

  # ---------------------------------------------------------------
  # Negative test: non-whitelisted endpoints MUST be blocked
  # ---------------------------------------------------------------
  negative-connection-tests:
    name: "Test DENIED Connections"
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: ${{ needs.prepare.outputs.whitelist }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Run denied connection tests"
        shell: bash
        env:
          TEST_DENIED: ${{ vars.TEST_DENIED }}
        run: |
          python3 scripts/connection_test.py \
            --mode denied \
            --targets-env TEST_DENIED \
            --connect-timeout 5 \
            --max-attempts 1 \
            --overall-timeout 30

  # ---------------------------------------------------------------
  # VEXXHOST CIDR report (informational)
  # ---------------------------------------------------------------
  vexxhost-cidr-report:
    name: "VEXXHOST CIDR variable report"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: [positive-connection-tests, negative-connection-tests]
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: "Summarise VEXXHOST CIDR blocks"
        shell: bash
        env:
          VEXXHOST_CIDR_BLOCKS: ${{ vars.VEXXHOST_CIDR_BLOCKS }}
        run: |
          set -u
          summary="$GITHUB_STEP_SUMMARY"
          {
            echo "## 🌐 VEXXHOST CIDR Blocks"
            echo ""
            echo "Raw CIDR list supplied via the \`VEXXHOST_CIDR_BLOCKS\`"
            echo "repository/org variable. This is informational: "
            echo "harden-runner's \`allowed-endpoints\` is DNS-based and"
            echo "does not accept CIDRs directly."
            echo ""
            echo '```text'
            printf '%s\n' "${VEXXHOST_CIDR_BLOCKS:-<unset>}"
            echo '```'
          } >> "$summary"
